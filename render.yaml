services:
  - type: web
    name: adadvisor-mcp
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn mcp_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_AD_ACCOUNT_ID
        sync: false
